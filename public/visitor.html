<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticket Info - Event Ticket System</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700;800&family=Great+Vibes&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f0f1a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 20px;
    }
    .ticket-page { width: 100%; max-width: 480px; }
    .loading { text-align: center; padding: 60px 20px; color: #64748b; }
    .loading .spinner {
      width: 32px; height: 32px; border: 3px solid rgba(139,92,246,0.2);
      border-top-color: #8b5cf6; border-radius: 50%; animation: spin 0.6s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes goldGlow {
      0%, 100% { text-shadow: 0 0 8px rgba(212,175,55,0.3); }
      50% { text-shadow: 0 0 20px rgba(212,175,55,0.6), 0 0 40px rgba(212,175,55,0.2); }
    }
    .designed-by {
      animation: goldGlow 2.5s ease-in-out infinite !important;
    }
    .error-state { text-align: center; padding: 60px 20px; }
    .error-state h3 { color: #fff; font-size: 20px; margin-bottom: 8px; }
    .error-state p { color: #64748b; font-size: 14px; margin-bottom: 20px; }
    .btn-primary {
      padding: 12px 24px; background: linear-gradient(135deg, #8b5cf6, #ec4899);
      color: #fff; border: none; border-radius: 12px; font-size: 14px;
      font-weight: 600; font-family: inherit; cursor: pointer; text-decoration: none; display: inline-block;
    }

    .ticket-card {
      background: linear-gradient(170deg, #1a1628 0%, #221d35 40%, #1d1930 100%);
      border-radius: 24px; overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      border: 1px solid rgba(212,175,55,0.12);
    }
    .ticket-card .accent { height: 4px; background: linear-gradient(90deg, #d4af37, #8b5cf6, #ec4899); }
    .ticket-card .body { padding: 24px; }
    .ticket-card h1 { font-size: 20px; font-weight: 700; color: #d4af37; margin-bottom: 4px; font-family: 'Playfair Display', serif; letter-spacing: 1px; }
    .ticket-card .subtitle { color: rgba(212,175,55,0.3); font-size: 12px; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 2px; display: none; }
    .ticket-card .info-grid { display: grid; gap: 0; }
    .ticket-card .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(212,175,55,0.06); font-size: 13px; }
    .ticket-card .info-row:last-child { border: none; }
    .ticket-card .info-row .lbl { color: rgba(212,175,55,0.4); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
    .ticket-card .info-row .val { color: #f1f5f9; font-weight: 600; }
    .status-active { color: #10b981; }
    .status-used { color: #f59e0b; }
    .ticket-card .footer {
      padding: 16px 24px; background: rgba(0,0,0,0.2);
      color: rgba(255,255,255,0.3); font-size: 10px; text-align: center;
      border-top: 1px solid rgba(212,175,55,0.06);
    }
    .ticket-card .footer .designed-by {
      font-family: 'Great Vibes', cursive;
      font-size: 16px;
      color: #d4af37;
      font-weight: 400;
      letter-spacing: 1px;
      margin-top: 6px;
    }
    .ticket-card .body .btn-primary {
      background: linear-gradient(135deg, #d4af37, #b8860b) !important;
    }
  </style>
</head>
<body>
  <div class="ticket-page">
    <div id="loadingState" class="loading">
      <div class="spinner"></div>
      <p>Loading ticket info...</p>
    </div>

    <div id="errorState" class="error-state" style="display:none">
      <div style="font-size:48px;margin-bottom:12px">&#128533;</div>
      <h3>Ticket Not Found</h3>
      <p id="errorMsg">This ticket does not exist.</p>
      <a href="/" class="btn-primary">Get Tickets</a>
    </div>

    <div id="ticketContent" style="display:none">
      <div class="ticket-card">
        <div class="accent"></div>
        <div class="body">
          <h1>&#127881; Event Ticket</h1>
          <div class="info-grid">
            <div class="info-row"><span class="lbl">Attendee</span><span class="val" id="detailName"></span></div>
            <div class="info-row"><span class="lbl">Email</span><span class="val" id="detailEmail"></span></div>
            <div class="info-row"><span class="lbl">Ticket Type</span><span class="val" id="detailType"></span></div>
            <div class="info-row"><span class="lbl">Event Date</span><span class="val" id="detailDate"></span></div>
            <div class="info-row"><span class="lbl">Status</span><span class="val" id="detailStatus"></span></div>
          </div>
          <div style="margin-top:20px">
            <a href="/" class="btn-primary" style="width:100%;text-align:center">Get Your Ticket</a>
          </div>
        </div>
        <div class="footer">
          Aravali Fashion Show 2026 &bull; Non-transferable
          <div class="designed-by">&#10022; Designed by Harman &#10022;</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async function() {
      const params = new URLSearchParams(window.location.search);
      let ticketId = params.get('id');

      if (!ticketId) {
        const pathParts = window.location.pathname.split('/visitor/');
        if (pathParts.length > 1) {
          ticketId = pathParts[1].split('?')[0];
        }
      }

      if (!ticketId) {
        showError('No ticket ID provided.');
        return;
      }

      await loadTicket(ticketId);
    });

    async function loadTicket(id) {
      document.getElementById('loadingState').style.display = 'block';
      document.getElementById('ticketContent').style.display = 'none';
      document.getElementById('errorState').style.display = 'none';

      try {
        const res = await fetch('/api/tickets/' + encodeURIComponent(id));
        if (!res.ok) {
          showError('Ticket not found');
          return;
        }
        const t = await res.json();
        renderTicket(t);
      } catch (err) {
        showError('Error: ' + err.message);
      }
    }

    function renderTicket(t) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('ticketContent').style.display = 'block';

      document.getElementById('detailName').textContent = t.fullName;
      document.getElementById('detailEmail').textContent = t.email;
      document.getElementById('detailType').textContent = t.ticketType;
      document.getElementById('detailDate').textContent = t.eventDate;

      if (t.status === 'Active') {
        document.getElementById('detailStatus').innerHTML = '<span class="status-active">Active (Not yet used)</span>';
      } else if (t.status === 'Used') {
        document.getElementById('detailStatus').innerHTML = '<span class="status-used">Used at ' + (t.usedAt || 'unknown') + '</span>';
      } else {
        document.getElementById('detailStatus').textContent = t.status;
      }
    }

    function showError(msg) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('ticketContent').style.display = 'none';
      document.getElementById('errorState').style.display = 'block';
      document.getElementById('errorMsg').textContent = msg;
    }
  </script>
</body>
</html>
