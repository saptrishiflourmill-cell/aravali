<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Pass - Aravali Fashion Show 2026</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f0f1a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 20px;
    }
    .pass-page { width: 100%; max-width: 480px; }
    .pass-header-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .pass-header-bar h1 { color: #fff; font-size: 22px; font-weight: 700; }
    .pass-header-bar .actions { display: flex; gap: 8px; }
    .pass-header-bar .actions button, .pass-header-bar .actions a {
      padding: 8px 16px; border-radius: 12px; font-size: 13px; font-weight: 600;
      font-family: inherit; cursor: pointer; border: none; text-decoration: none;
    }
    .btn-primary {
      background: #8b5cf6; color: #fff; display: inline-flex; align-items: center; gap: 4px;
    }
    .btn-outline {
      background: rgba(255,255,255,0.06); color: #94a3b8; border: 1px solid rgba(255,255,255,0.1);
      display: inline-flex; align-items: center; gap: 4px;
    }
    .loading { text-align: center; padding: 60px 20px; color: #94a3b8; }
    .loading .spinner {
      width: 32px; height: 32px; border: 3px solid rgba(139,92,246,0.2);
      border-top-color: #8b5cf6; border-radius: 50%; animation: spin 0.6s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-state { text-align: center; padding: 60px 20px; }
    .error-state h3 { color: #fff; font-size: 20px; margin-bottom: 8px; }
    .error-state p { color: #64748b; font-size: 14px; margin-bottom: 20px; }

    /* ===== LUXURY TICKET ===== */
    .ticket {
      position: relative;
      background: linear-gradient(170deg, #1a1628 0%, #221d35 40%, #1d1930 100%);
      border-radius: 20px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(212, 175, 55, 0.12),
        0 20px 60px rgba(0,0,0,0.6),
        0 0 40px rgba(212, 175, 55, 0.03);
    }
    .ticket-gold-edge {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      padding: 1px;
      background: linear-gradient(135deg, rgba(212,175,55,0.25), rgba(212,175,55,0.05), rgba(212,175,55,0.2));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      z-index: 5;
    }
    .ticket-pattern {
      position: absolute;
      inset: 0;
      opacity: 0.03;
      background-image:
        repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(212,175,55,0.3) 20px, rgba(212,175,55,0.3) 21px),
        repeating-linear-gradient(-45deg, transparent, transparent 20px, rgba(212,175,55,0.3) 20px, rgba(212,175,55,0.3) 21px);
      pointer-events: none;
      z-index: 1;
    }
    .ticket-bg-glow {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 15% 20%, rgba(212,175,55,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 85% 80%, rgba(139,92,246,0.06) 0%, transparent 50%);
      pointer-events: none;
      z-index: 1;
    }
    .ticket-inner {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
    }
    .ticket-top {
      padding: 18px 24px 14px;
      text-align: center;
      border-bottom: 1px solid rgba(212,175,55,0.08);
      background: linear-gradient(180deg, rgba(212,175,55,0.03) 0%, transparent 100%);
    }
    .ticket-event-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(16px, 4vw, 20px);
      font-weight: 700;
      color: #d4af37;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-shadow: 0 0 40px rgba(212,175,55,0.15);
      line-height: 1.3;
    }
    .ticket-event-sub {
      font-size: 9px;
      color: rgba(212,175,55,0.3);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 4px;
      font-weight: 500;
    }
    .ticket-id-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
    }
    .ticket-id-bar .dot-sep {
      width: 3px; height: 3px; border-radius: 50%;
      background: rgba(212,175,55,0.2);
    }
    .ticket-id-val {
      font-size: 9px;
      color: rgba(255,255,255,0.2);
      font-family: 'Inter', monospace;
      letter-spacing: 1.5px;
    }
    .ticket-main {
      display: flex;
      padding: 0;
      align-items: stretch;
    }
    .ticket-qr-col {
      flex: 0 0 auto;
      padding: 20px 0 20px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .ticket-qr-wrap {
      position: relative;
      background: #fff;
      border-radius: 12px;
      padding: 8px;
      box-shadow: 0 0 30px rgba(212,175,55,0.06);
    }
    .ticket-qr-wrap img {
      display: block;
      width: 110px;
      height: 110px;
      border-radius: 6px;
    }
    .ticket-qr-corner {
      position: absolute;
      width: 18px; height: 18px;
      border-color: #d4af37;
      border-style: solid;
      opacity: 0.5;
    }
    .ticket-qr-corner.tl { top: -2px; left: -2px; border-width: 2px 0 0 2px; border-radius: 4px 0 0 0; }
    .ticket-qr-corner.tr { top: -2px; right: -2px; border-width: 2px 2px 0 0; border-radius: 0 4px 0 0; }
    .ticket-qr-corner.bl { bottom: -2px; left: -2px; border-width: 0 0 2px 2px; border-radius: 0 0 0 4px; }
    .ticket-qr-corner.br { bottom: -2px; right: -2px; border-width: 0 2px 2px 0; border-radius: 0 0 4px 0; }
    .ticket-qr-label {
      font-size: 7px;
      letter-spacing: 3px;
      color: rgba(212,175,55,0.25);
      margin-top: 8px;
      font-weight: 600;
    }
    .ticket-scan-line {
      position: absolute;
      left: 8px; right: 8px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #d4af37, transparent);
      animation: tScanLine 2.5s ease-in-out infinite;
      opacity: 0.4;
      pointer-events: none;
      z-index: 3;
    }
    @keyframes tScanLine {
      0% { top: 16px; opacity: 0; }
      20% { opacity: 0.6; }
      80% { opacity: 0.6; }
      100% { top: calc(100% - 16px); opacity: 0; }
    }
    .ticket-scallop {
      flex: 0 0 22px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .ticket-scallop::before,
    .ticket-scallop::after {
      content: '';
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #0f0f1a;
      border: 1.5px solid rgba(212,175,55,0.1);
      flex-shrink: 0;
      z-index: 2;
    }
    .ticket-scallop-line {
      flex: 1;
      width: 1px;
      background: repeating-linear-gradient(to bottom, rgba(212,175,55,0.1) 0px, rgba(212,175,55,0.1) 4px, transparent 4px, transparent 8px);
    }
    .ticket-info-col {
      flex: 1;
      padding: 16px 24px 16px 4px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
    }
    .ticket-guest-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(16px, 3.5vw, 20px);
      font-weight: 700;
      color: #f1f5f9;
      line-height: 1.2;
      letter-spacing: 0.5px;
    }
    .ticket-info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 16px;
    }
    .tig-label {
      font-size: 7px;
      font-weight: 700;
      color: rgba(148,163,184,0.35);
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .tig-value {
      font-size: 11px;
      font-weight: 500;
      color: #e2e8f0;
      margin-top: 1px;
      line-height: 1.3;
    }
    .ticket-email-row {
      margin-top: 2px;
    }
    .ticket-email-row .tig-value {
      font-size: 9px;
      color: rgba(148,163,184,0.5);
      word-break: break-all;
    }
    .ticket-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #d4af37;
      margin-top: 2px;
    }
    .ticket-badge .badge-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: #10b981;
      box-shadow: 0 0 6px rgba(16,185,129,0.4);
    }
    .ticket-badge.used .badge-dot { background: #f59e0b; }
    .ticket-badge.used { color: #f59e0b; }
    .ticket-foot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 24px;
      border-top: 1px solid rgba(212,175,55,0.06);
      background: rgba(0,0,0,0.15);
    }
    .ticket-foot img { height: 16px; width: auto; opacity: 0.25; }
    .ticket-foot-label {
      font-size: 7px;
      font-weight: 600;
      color: rgba(148,163,184,0.2);
      letter-spacing: 2px;
    }
    @media (max-width: 500px) {
      .ticket-main { flex-direction: column; align-items: center; }
      .ticket-qr-col { padding: 20px 20px 8px; }
      .ticket-qr-wrap img { width: 130px; height: 130px; }
      .ticket-scallop { flex-direction: row; width: 100%; height: 18px; padding: 0 20px; }
      .ticket-scallop::before, .ticket-scallop::after { width: 12px; height: 12px; }
      .ticket-scallop-line { width: 100%; height: 1px; background: repeating-linear-gradient(90deg, rgba(212,175,55,0.1) 0px, rgba(212,175,55,0.1) 4px, transparent 4px, transparent 8px); }
      .ticket-info-col { padding: 8px 20px 16px; }
      .ticket-guest-name { text-align: center; }
      .ticket-info-grid { grid-template-columns: 1fr 1fr; gap: 6px 12px; }
      .ticket-top { padding: 14px 16px 10px; }
      .ticket-foot { padding: 6px 16px; }
    }
  </style>
</head>
<body>
  <div class="pass-page">
    <div class="pass-header-bar no-print">
      <h1>&#127881; Event Pass</h1>
      <div class="actions">
        <button class="btn-outline" onclick="downloadQR()">Download QR</button>
        <button class="btn-primary" onclick="window.print()">Print</button>
      </div>
    </div>

    <div id="loadingState" class="loading">
      <div class="spinner"></div>
      <p>Loading your pass...</p>
    </div>

    <div id="errorState" class="error-state" style="display:none">
      <div style="font-size:48px;margin-bottom:12px">&#128533;</div>
      <h3>Pass Not Found</h3>
      <p id="errorMsg">The ticket ID could not be found.</p>
      <a href="/" class="btn-primary" style="padding:12px 24px;border-radius:12px;font-size:14px;font-weight:600;text-decoration:none;display:inline-block">Buy a Ticket</a>
    </div>

    <div id="passContent" style="display:none">
      <div class="ticket">
        <div class="ticket-gold-edge"></div>
        <div class="ticket-pattern"></div>
        <div class="ticket-bg-glow"></div>
        <div class="ticket-inner">
          <div class="ticket-top">
            <div class="ticket-event-name">Aravali Fashion Show 2026</div>
            <div class="ticket-event-sub">&#9733; Entry Pass &#9733;</div>
            <div class="ticket-id-bar">
              <span class="ticket-id-val" id="passTicketId">-</span>
              <span class="dot-sep"></span>
              <span class="ticket-id-val">VIP</span>
            </div>
          </div>
          <div class="ticket-main">
            <div class="ticket-qr-col">
              <div class="ticket-qr-wrap">
                <img id="passQRImg" alt="QR Code">
                <div class="ticket-scan-line"></div>
                <div class="ticket-qr-corner tl"></div>
                <div class="ticket-qr-corner tr"></div>
                <div class="ticket-qr-corner bl"></div>
                <div class="ticket-qr-corner br"></div>
              </div>
              <div class="ticket-qr-label">SCAN FOR ADMISSION</div>
            </div>
            <div class="ticket-scallop">
              <div class="ticket-scallop-line"></div>
            </div>
            <div class="ticket-info-col">
              <div class="ticket-guest-name" id="passName">-</div>
              <div class="ticket-info-grid">
                <div class="tig-item">
                  <div class="tig-label">Date</div>
                  <div class="tig-value" id="passDate">-</div>
                </div>
                <div class="tig-item">
                  <div class="tig-label">Time</div>
                  <div class="tig-value">7:00 PM</div>
                </div>
                <div class="tig-item">
                  <div class="tig-label">Category</div>
                  <div class="tig-value" id="passCategory">-</div>
                </div>
                <div class="tig-item">
                  <div class="tig-label">Persons</div>
                  <div class="tig-value" id="passPersons">-</div>
                </div>
                <div class="tig-item">
                  <div class="tig-label">Amount</div>
                  <div class="tig-value" id="passAmount">&#8377;1</div>
                </div>
              </div>
              <div class="ticket-email-row">
                <div class="tig-label">Email</div>
                <div class="tig-value" id="passEmail">-</div>
              </div>
              <div class="ticket-badge" id="passBadge">
                <span class="badge-dot"></span> Active
              </div>
            </div>
          </div>
          <div class="ticket-foot">
            <img src="/logo.png" alt="">
            <span class="ticket-foot-label">&#127928; Aravali Fashion Show 2026</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentTicket = null;

    document.addEventListener('DOMContentLoaded', async function() {
      const params = new URLSearchParams(window.location.search);
      let ticketId = params.get('id');

      if (!ticketId) {
        const pathParts = window.location.pathname.split('/ticket/');
        if (pathParts.length > 1) {
          ticketId = pathParts[1].split('?')[0].split('/')[0];
        }
      }

      if (!ticketId) {
        showError('No ticket ID provided.');
        return;
      }

      await loadTicket(ticketId);
    });

    async function loadTicket(id) {
      document.getElementById('loadingState').style.display = 'block';
      document.getElementById('passContent').style.display = 'none';
      document.getElementById('errorState').style.display = 'none';

      try {
        const res = await fetch('/api/tickets/' + encodeURIComponent(id));
        if (!res.ok) {
          showError('Ticket "' + id + '" not found. Please check your link.');
          return;
        }
        const data = await res.json();
        currentTicket = data;
        renderPass(data);
      } catch (err) {
        showError('Error loading ticket: ' + err.message);
      }
    }

    function renderPass(t) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('passContent').style.display = 'block';

      document.getElementById('passTicketId').textContent = t.ticketId;
      document.getElementById('passName').textContent = t.fullName;
      document.getElementById('passEmail').textContent = t.email;
      document.getElementById('passDate').textContent = t.eventDate;
      document.getElementById('passAmount').textContent = t.price === 0 ? 'FREE' : '\u20B910';
      document.getElementById('passCategory').textContent = t.ticketType || 'Single';
      document.getElementById('passPersons').textContent = (t.quantity || 1) + ' Person' + ((t.quantity || 1) > 1 ? 's' : '');

      const badge = document.getElementById('passBadge');
      const dot = badge.querySelector('.badge-dot');
      if (t.status === 'Active') {
        badge.className = 'ticket-badge';
        badge.innerHTML = '<span class="badge-dot"></span> Active';
      } else if (t.status === 'Used') {
        badge.className = 'ticket-badge used';
        badge.innerHTML = '<span class="badge-dot"></span> Used at ' + (t.usedAt || 'checked in');
      } else {
        badge.className = 'ticket-badge';
        badge.innerHTML = '<span class="badge-dot"></span> ' + t.status;
      }

      const qrUrl = '/qrcodes/' + t.ticketId + '.png?t=' + Date.now();
      document.getElementById('passQRImg').src = qrUrl;
    }

    function downloadQR() {
      if (currentTicket) {
        window.open('/api/tickets/download-qr/' + currentTicket.ticketId, '_blank');
      }
    }

    function showError(msg) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('passContent').style.display = 'none';
      document.getElementById('errorState').style.display = 'block';
      document.getElementById('errorMsg').textContent = msg;
    }
  </script>
</body>
</html>
