<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Pass - Summer Music Fest</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f0f1a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 20px;
    }
    .pass-page { width: 100%; max-width: 480px; }
    .pass-header-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .pass-header-bar h1 { color: #fff; font-size: 22px; font-weight: 700; }
    .pass-header-bar .actions { display: flex; gap: 8px; }
    .pass-header-bar .actions button, .pass-header-bar .actions a {
      padding: 8px 16px; border-radius: 12px; font-size: 13px; font-weight: 600;
      font-family: inherit; cursor: pointer; border: none; text-decoration: none;
    }
    .btn-primary {
      background: #8b5cf6; color: #fff; display: inline-flex; align-items: center; gap: 4px;
    }
    .btn-outline {
      background: rgba(255,255,255,0.06); color: #94a3b8; border: 1px solid rgba(255,255,255,0.1);
      display: inline-flex; align-items: center; gap: 4px;
    }
    .loading { text-align: center; padding: 60px 20px; color: #94a3b8; }
    .loading .spinner {
      width: 32px; height: 32px; border: 3px solid rgba(139,92,246,0.2);
      border-top-color: #8b5cf6; border-radius: 50%; animation: spin 0.6s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-state { text-align: center; padding: 60px 20px; }
    .error-state h3 { color: #fff; font-size: 20px; margin-bottom: 8px; }
    .error-state p { color: #64748b; font-size: 14px; margin-bottom: 20px; }

    /* ===== PREMIUM TICKET DESIGN ===== */
    .ticket {
      position: relative;
      background: linear-gradient(145deg, #1e1b2e, #2a1f3e);
      border-radius: 24px;
      overflow: hidden;
      padding: 0;
      box-shadow:
        0 0 0 1px rgba(139,92,246,0.15),
        0 20px 60px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.06);
    }
    .ticket-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 10%, rgba(139,92,246,0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 90%, rgba(236,72,153,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 50% 50%, rgba(255,215,0,0.02) 0%, transparent 70%);
      pointer-events: none;
    }
    .ticket-glow {
      position: absolute;
      top: -50%;
      left: -50%;
      right: -50%;
      bottom: -50%;
      background: conic-gradient(from 0deg at 50% 50%, transparent, rgba(139,92,246,0.03), transparent, rgba(236,72,153,0.03), transparent);
      animation: ticketSpin 12s linear infinite;
      pointer-events: none;
    }
    @keyframes ticketSpin { to { transform: rotate(360deg); } }
    .ticket-header {
      position: relative;
      z-index: 2;
      padding: 24px 28px 16px;
      text-align: center;
      border-bottom: 1px solid rgba(255,215,0,0.08);
    }
    .ticket-event-badge {
      font-size: 12px;
      font-weight: 700;
      color: #fbbf24;
      text-transform: uppercase;
      letter-spacing: 3px;
      text-shadow: 0 0 20px rgba(251,191,36,0.2);
    }
    .ticket-id-small {
      font-size: 11px;
      color: rgba(148,163,184,0.5);
      font-family: monospace;
      margin-top: 5px;
      letter-spacing: 1px;
    }
    .ticket-body {
      position: relative;
      z-index: 2;
      display: flex;
      gap: 0;
      padding: 0;
    }
    .ticket-qr-section {
      flex: 0 0 auto;
      padding: 24px 20px 20px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .ticket-qr-frame {
      position: relative;
      background: #ffffff;
      border-radius: 16px;
      padding: 12px;
      box-shadow:
        0 0 0 2px rgba(139,92,246,0.2),
        0 0 30px rgba(139,92,246,0.1),
        inset 0 0 0 1px rgba(139,92,246,0.1);
      overflow: hidden;
    }
    .ticket-qr-frame img {
      display: block;
      max-width: 130px;
      width: 100%;
      height: auto;
      border-radius: 8px;
    }
    @keyframes tScanLine {
      0% { top: 20px; opacity: 0; }
      20% { opacity: 0.7; }
      80% { opacity: 0.7; }
      100% { top: calc(100% - 20px); opacity: 0; }
    }
    .ticket-qr-label {
      font-size: 8px;
      letter-spacing: 2.5px;
      color: rgba(139,92,246,0.4);
      margin-top: 8px;
      font-weight: 700;
    }
    .ticket-divider {
      flex: 0 0 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      padding: 10px 0;
    }
    .td-circle {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #0f0f1a;
      border: 2px solid rgba(139,92,246,0.15);
      flex-shrink: 0;
      z-index: 2;
    }
    .td-line {
      flex: 1;
      width: 2px;
      background: repeating-linear-gradient(to bottom, rgba(139,92,246,0.15) 0px, rgba(139,92,246,0.15) 6px, transparent 6px, transparent 10px);
      margin: -1px 0;
    }
    .ticket-info {
      flex: 1;
      padding: 20px 28px 20px 4px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .ticket-attendee { margin-bottom: 2px; }
    .ti-label {
      font-size: 9px;
      font-weight: 700;
      color: rgba(148,163,184,0.5);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 2px;
    }
    .ti-value {
      font-size: 14px;
      font-weight: 600;
      color: #f1f5f9;
      line-height: 1.3;
    }
    .ticket-row {
      display: flex;
      gap: 16px;
    }
    .ticket-col { flex: 1; }
    .ticket-col .ti-value { font-size: 12px; }
    .ticket-status {
      margin-top: 4px;
      font-size: 10px;
      font-weight: 700;
      color: #10b981;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .ticket-footer {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 28px;
      border-top: 1px solid rgba(255,255,255,0.04);
      background: rgba(0,0,0,0.2);
    }
    .tf-left { display: flex; align-items: center; gap: 8px; }
    .tf-right {
      font-size: 9px;
      font-weight: 600;
      color: rgba(148,163,184,0.3);
      letter-spacing: 1.5px;
    }
    .status-active { color: #10b981; }
    .status-used { color: #f59e0b; }

    @media (max-width: 500px) {
      .ticket-body { flex-direction: column; align-items: center; }
      .ticket-qr-section { padding: 20px 20px 10px; }
      .ticket-qr-frame img { max-width: 140px; }
      .ticket-divider { flex-direction: row; padding: 0 20px; width: 100%; }
      .td-line { width: 100%; height: 2px; margin: 0 -1px; background: repeating-linear-gradient(90deg, rgba(139,92,246,0.15) 0px, rgba(139,92,246,0.15) 6px, transparent 6px, transparent 10px); }
      .td-circle { width: 12px; height: 12px; }
      .ticket-info { padding: 10px 20px 20px; width: 100%; }
      .ticket-header { padding: 18px 20px 12px; }
      .ticket-footer { padding: 8px 20px; }
    }
  </style>
</head>
<body>
  <div class="pass-page">
    <div class="pass-header-bar no-print">
      <h1>&#127881; Event Pass</h1>
      <div class="actions">
        <button class="btn-outline" onclick="downloadQR()">Download QR</button>
        <button class="btn-primary" onclick="window.print()">Print</button>
      </div>
    </div>

    <div id="loadingState" class="loading">
      <div class="spinner"></div>
      <p>Loading your pass...</p>
    </div>

    <div id="errorState" class="error-state" style="display:none">
      <div style="font-size:48px;margin-bottom:12px">&#128533;</div>
      <h3>Pass Not Found</h3>
      <p id="errorMsg">The ticket ID could not be found.</p>
      <a href="/" class="btn-primary" style="padding:12px 24px;border-radius:12px;font-size:14px;font-weight:600;text-decoration:none;display:inline-block">Buy a Ticket</a>
    </div>

    <div id="passContent" style="display:none">
      <div class="ticket">
        <div class="ticket-bg"></div>
        <div class="ticket-glow"></div>
        <div class="ticket-header">
          <div class="ticket-event-badge">Aravali Fashion Show 2026</div>
          <div class="ticket-id-small" id="passTicketId">-</div>
        </div>
        <div class="ticket-body">
          <div class="ticket-qr-section">
            <div class="ticket-qr-frame">
              <div class="ticket-qr-scan-line" style="position:absolute;left:12px;right:12px;height:2px;background:linear-gradient(90deg,transparent,#8b5cf6,#ec4899,transparent);animation:tScanLine 2.5s ease-in-out infinite;opacity:0.6;pointer-events:none"></div>
              <img id="passQRImg" alt="QR Code">
            </div>
            <div class="ticket-qr-label">SCAN FOR ENTRY</div>
          </div>
          <div class="ticket-divider">
            <div class="td-circle"></div>
            <div class="td-line"></div>
            <div class="td-circle"></div>
          </div>
          <div class="ticket-info">
            <div class="ticket-attendee">
              <div class="ti-label">ATTENDEE</div>
              <div class="ti-value" id="passName">-</div>
            </div>
            <div class="ticket-row">
              <div class="ticket-col">
                <div class="ti-label">DATE</div>
                <div class="ti-value" id="passDate">-</div>
              </div>
              <div class="ticket-col">
                <div class="ti-label">VENUE</div>
                <div class="ti-value">Sawariya Resort, Alwar</div>
              </div>
            </div>
            <div class="ticket-row">
              <div class="ticket-col">
                <div class="ti-label">TIME</div>
                <div class="ti-value">7:00 PM</div>
              </div>
              <div class="ticket-col">
                <div class="ti-label">AMOUNT</div>
                <div class="ti-value" id="passAmount">&#8377;1</div>
              </div>
            </div>
            <div class="ticket-row">
              <div class="ticket-col">
                <div class="ti-label">EMAIL</div>
                <div class="ti-value" id="passEmail" style="font-size:10px;word-break:break-all">-</div>
              </div>
            </div>
            <div class="ticket-status" id="passStatus">&#10003; ACTIVE</div>
          </div>
        </div>
        <div class="ticket-footer">
          <div class="tf-left">
            <img src="/logo.png" alt="" style="height:18px;width:auto;opacity:0.6">
          </div>
          <div class="tf-right">&#127928; ARAVALI FASHION SHOW 2026</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentTicket = null;

    document.addEventListener('DOMContentLoaded', async function() {
      const params = new URLSearchParams(window.location.search);
      let ticketId = params.get('id');

      if (!ticketId) {
        const pathParts = window.location.pathname.split('/ticket/');
        if (pathParts.length > 1) {
          ticketId = pathParts[1].split('?')[0].split('/')[0];
        }
      }

      if (!ticketId) {
        showError('No ticket ID provided.');
        return;
      }

      await loadTicket(ticketId);
    });

    async function loadTicket(id) {
      document.getElementById('loadingState').style.display = 'block';
      document.getElementById('passContent').style.display = 'none';
      document.getElementById('errorState').style.display = 'none';

      try {
        const res = await fetch('/api/tickets/' + encodeURIComponent(id));
        if (!res.ok) {
          showError('Ticket "' + id + '" not found. Please check your link.');
          return;
        }
        const data = await res.json();
        currentTicket = data;
        renderPass(data);
      } catch (err) {
        showError('Error loading ticket: ' + err.message);
      }
    }

    function renderPass(t) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('passContent').style.display = 'block';

      document.getElementById('passTicketId').textContent = t.ticketId;
      document.getElementById('passName').textContent = t.fullName;
      document.getElementById('passEmail').textContent = t.email;
      document.getElementById('passDate').textContent = t.eventDate;
      document.getElementById('passAmount').textContent = '\u20B91';

      if (t.status === 'Active') {
        document.getElementById('passStatus').innerHTML = '\u2713 ACTIVE';
      } else if (t.status === 'Used') {
        document.getElementById('passStatus').innerHTML = '\u26A0 Used at ' + (t.usedAt || 'unknown');
      } else {
        document.getElementById('passStatus').textContent = t.status;
      }

      const qrUrl = '/qrcodes/' + t.ticketId + '.png?t=' + Date.now();
      document.getElementById('passQRImg').src = qrUrl;
    }

    function downloadQR() {
      if (currentTicket) {
        window.open('/api/tickets/download-qr/' + currentTicket.ticketId, '_blank');
      }
    }

    function showError(msg) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('passContent').style.display = 'none';
      document.getElementById('errorState').style.display = 'block';
      document.getElementById('errorMsg').textContent = msg;
    }
  </script>
</body>
</html>
