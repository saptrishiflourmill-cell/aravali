<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dashboard - Event Ticket System</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #07070f;
      min-height: 100vh;
      color: #fff;
    }
    #bg-gradient {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(139,92,246,0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 100%, rgba(236,72,153,0.07) 0%, transparent 60%);
    }

    /* ── Compact Top Bar ── */
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; background: transparent !important;
      margin-bottom: 0 !important; box-shadow: none !important;
      border-radius: 0 !important;
    }
    .top-bar .brand {
      display: flex; align-items: center; gap: 10px;
    }
    .top-bar .brand-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #8b5cf6, #ec4899);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      box-shadow: 0 3px 10px rgba(139,92,246,0.35);
    }
    .top-bar .brand-name {
      font-size: 15px; font-weight: 700; background: linear-gradient(135deg, #c4b5fd, #f9a8d4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: -0.3px;
    }
    .top-bar .user-section {
      display: flex; align-items: center; gap: 8px;
    }
    .top-bar .avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #db2777);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #fff;
      box-shadow: 0 2px 8px rgba(139,92,246,0.3);
    }
    .top-bar .logout-btn {
      width: 30px; height: 30px; border-radius: 50%;
      background: rgba(239,68,68,0.12); border: none;
      color: #f87171; font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .top-bar .logout-btn:active { background: rgba(239,68,68,0.25); transform: scale(0.9); }

    /* ── Tabs ── */
    .tabs {
      display: flex; padding: 8px 16px; gap: 6px;
      margin-bottom: 4px;
    }
    .tab {
      padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: 600;
      font-family: inherit; cursor: pointer; border: none; white-space: nowrap;
      background: rgba(139,92,246,0.06); color: #64748b;
      transition: all 0.2s;
    }
    .tab.active { background: rgba(139,92,246,0.18); color: #c4b5fd; }
    .tab:active { transform: scale(0.96); }

    .content { padding: 12px 16px 80px; max-width: 800px; margin: 0 auto; }

    /* ── Stats ── */
    .stats-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px;
    }
    .stat-card {
      padding: 16px; border-radius: 16px;
      position: relative; overflow: hidden;
    }
    .stat-card .sc-val { font-size: 28px; font-weight: 800; color: #fff; margin-bottom: 1px; }
    .stat-card .sc-label { font-size: 11px; color: rgba(255,255,255,0.5); font-weight: 500; text-transform: uppercase; letter-spacing: 0.4px; }
    .stat-card .sc-icon {
      position: absolute; right: 12px; top: 10px; font-size: 22px; opacity: 0.2;
    }
    .stat-card.purple { background: linear-gradient(135deg, rgba(139,92,246,0.3), rgba(139,92,246,0.08)); border: 1px solid rgba(139,92,246,0.2); }
    .stat-card.green { background: linear-gradient(135deg, rgba(16,185,129,0.3), rgba(16,185,129,0.08)); border: 1px solid rgba(16,185,129,0.2); }
    .stat-card.yellow { background: linear-gradient(135deg, rgba(245,158,11,0.3), rgba(245,158,11,0.08)); border: 1px solid rgba(245,158,11,0.2); }
    .stat-card.blue { background: linear-gradient(135deg, rgba(59,130,246,0.3), rgba(59,130,246,0.08)); border: 1px solid rgba(59,130,246,0.2); }

    /* ── Filter ── */
    .filter-row {
      display: flex; gap: 8px; margin-bottom: 14px;
    }
    .filter-row input {
      flex: 1; min-width: 0; padding: 10px 14px;
      background: rgba(139,92,246,0.06); border: 1px solid rgba(139,92,246,0.12);
      border-radius: 12px; font-size: 13px; color: #e2e8f0; font-family: inherit; outline: none;
    }
    .filter-row input:focus { border-color: #8b5cf6; box-shadow: 0 0 0 2px rgba(139,92,246,0.1); }
    .filter-row input::placeholder { color: #475569; }
    .filter-row input[type="date"] {
      min-width: 130px; flex: none; color-scheme: dark;
    }

    /* ── Tickets ── */
    .ticket-list { display: flex; flex-direction: column; gap: 8px; }
    .ticket-card {
      background: rgba(139,92,246,0.04); border: 1px solid rgba(139,92,246,0.08);
      border-radius: 16px; padding: 14px 16px; transition: all 0.15s;
    }
    .ticket-card:active { background: rgba(139,92,246,0.09); transform: scale(0.99); }
    .tc-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
    .tc-id { font-size: 12px; color: #a78bfa; font-weight: 700; font-family: monospace; letter-spacing: 0.3px; }
    .tc-status { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
    .tc-status.active { background: rgba(16,185,129,0.15); color: #34d399; }
    .tc-status.used { background: rgba(245,158,11,0.15); color: #fbbf24; }
    .tc-name { font-size: 15px; font-weight: 600; color: #e2e8f0; margin-bottom: 2px; }
    .tc-meta { font-size: 12px; color: #64748b; display: flex; gap: 12px; flex-wrap: wrap; }
    .tc-meta span { display: flex; align-items: center; gap: 4px; }
    .tc-actions { display: flex; gap: 6px; margin-top: 10px; }
    .tc-actions button {
      flex: 1; padding: 8px; border-radius: 10px; font-size: 12px; font-weight: 600;
      font-family: inherit; cursor: pointer; border: none; transition: all 0.12s;
    }
    .tc-actions button:active { transform: scale(0.96); }
    .tc-actions .tc-view { background: rgba(139,92,246,0.15); color: #c4b5fd; }
    .tc-actions .tc-qr { background: rgba(16,185,129,0.12); color: #6ee7b7; }
    .tc-actions .tc-del { background: rgba(239,68,68,0.12); color: #fca5a5; }

    .empty-state { text-align: center; padding: 40px 20px; }
    .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
    .empty-state h3 { color: #94a3b8; font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .empty-state p { color: #475569; font-size: 13px; }

    .loading-state { text-align: center; padding: 40px; }
    .spinner {
      width: 28px; height: 28px; border: 3px solid rgba(139,92,246,0.15);
      border-top-color: #a78bfa; border-radius: 50%; animation: spin 0.6s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-state p { color: #64748b; font-size: 13px; }

    .pagination {
      display: flex; justify-content: center; align-items: center;
      gap: 8px; margin-top: 18px; padding: 8px 0;
      border-top: none !important;
    }
    .pagination button {
      padding: 8px 16px; border-radius: 10px; font-size: 13px; font-weight: 600;
      font-family: inherit; cursor: pointer; border: none;
      background: rgba(139,92,246,0.1); color: #a78bfa;
    }
    .pagination button:hover:not(:disabled) { background: rgba(139,92,246,0.2); color: #c4b5fd; border-color: transparent; }
    .pagination button:disabled { opacity: 0.25; cursor: not-allowed; }
    .pagination span { color: #64748b; font-size: 13px; }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      padding: 12px 24px; border-radius: 14px; color: #fff; font-size: 14px;
      z-index: 10000; animation: toastIn 0.3s ease;
      backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08);
    }
    .toast.error { background: rgba(239,68,68,0.85); }
    .toast.success { background: rgba(16,185,129,0.85); }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>
<body>
  <div id="bg-gradient"></div>

  <div class="top-bar">
    <div class="brand">
      <div class="brand-icon">&#127928;</div>
      <span class="brand-name">EventTix</span>
    </div>
    <div class="user-section" id="userSection" style="display:none">
      <div class="avatar" id="avatarEl">A</div>
      <button class="logout-btn" id="logoutBtn" onclick="logout()" title="Sign Out">&#10140;</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active">&#9783; Dashboard</button>
    <button class="tab" onclick="window.location.href='/scanner.html'">&#128247; Scanner</button>
  </div>

  <div class="content">
    <div class="stats-grid" id="statsCards">
      <div class="stat-card purple">
        <div class="sc-val" id="statTotal">0</div>
        <div class="sc-label">Sold</div>
        <div class="sc-icon">&#127942;</div>
      </div>
      <div class="stat-card green">
        <div class="sc-val" id="statActive">0</div>
        <div class="sc-label">Active</div>
        <div class="sc-icon">&#10003;</div>
      </div>
      <div class="stat-card yellow">
        <div class="sc-val" id="statUsed">0</div>
        <div class="sc-label">Checked In</div>
        <div class="sc-icon">&#128247;</div>
      </div>
      <div class="stat-card blue">
        <div class="sc-val" id="statToday">0</div>
        <div class="sc-label">Today</div>
        <div class="sc-icon">&#128197;</div>
      </div>
    </div>

    <div class="filter-row">
      <input type="text" id="searchInput" placeholder="Search name, email, ID..." oninput="debouncedSearch()">
      <input type="date" id="dateFilter" onchange="loadTickets(1)">
    </div>

    <div id="loadingState" class="loading-state" style="display:none">
      <div class="spinner"></div>
      <p>Loading tickets...</p>
    </div>

    <div id="emptyState" class="empty-state" style="display:none">
      <div class="empty-icon">&#128465;</div>
      <h3>No tickets found</h3>
      <p>Try adjusting your search.</p>
    </div>

    <div class="ticket-list" id="ticketList"></div>

    <div class="pagination" id="pagination">
      <button id="prevPage" onclick="changePage(-1)" disabled>&larr; Prev</button>
      <span id="pageInfo">Page 1 of 1</span>
      <button id="nextPage" onclick="changePage(1)" disabled>Next &rarr;</button>
    </div>
  </div>

  <script>
    let currentPage = 1;
    let currentData = null;
    let searchTimer = null;

    function getToken() {
      const r = localStorage.getItem('authRemember');
      if (r === '1') return localStorage.getItem('authToken');
      return localStorage.getItem('authToken') || sessionStorage.getItem('authToken');
    }

    function clearAuth() {
      localStorage.removeItem('authToken'); localStorage.removeItem('authUser');
      localStorage.removeItem('authRemember'); sessionStorage.removeItem('authToken');
      sessionStorage.removeItem('authUser');
    }

    async function checkAuth() {
      const token = getToken();
      if (!token) { window.location.href = '/login.html?redirect=/dashboard.html'; return; }
      try {
        const res = await fetch('/api/auth/check', { headers: { 'Authorization': 'Bearer ' + token } });
        const data = await res.json();
        if (!data.authenticated) { clearAuth(); window.location.href = '/login.html?redirect=/dashboard.html'; return; }
        const name = data.username || 'A';
        document.getElementById('avatarEl').textContent = name.charAt(0).toUpperCase();
        document.getElementById('userSection').style.display = 'flex';
      } catch (e) { window.location.href = '/login.html?redirect=/dashboard.html'; }
    }

    function logout() {
      const token = getToken();
      if (token) fetch('/api/auth/logout', { method: 'POST', headers: { 'Authorization': 'Bearer ' + token } }).catch(() => {});
      clearAuth();
      window.location.href = '/login.html';
    }

    document.addEventListener('DOMContentLoaded', async function() {
      await checkAuth();
      loadStats();
      loadTickets(1);
    });

    function authFetch(url, options = {}) {
      const token = getToken();
      const headers = options.headers || {};
      headers['Authorization'] = 'Bearer ' + token;
      return fetch(url, { ...options, headers });
    }

    function debouncedSearch() {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => loadTickets(1), 300);
    }

    async function loadStats() {
      try {
        const res = await authFetch('/api/tickets/stats');
        const data = await res.json();
        document.getElementById('statTotal').textContent = data.total;
        document.getElementById('statActive').textContent = data.active;
        document.getElementById('statUsed').textContent = data.used;
        document.getElementById('statToday').textContent = data.today;
      } catch (err) { console.error('Stats error:', err); }
    }

    async function loadTickets(page) {
      currentPage = page;
      const search = document.getElementById('searchInput').value;
      const date = document.getElementById('dateFilter').value;

      document.getElementById('loadingState').style.display = 'block';
      document.getElementById('ticketList').style.display = 'none';
      document.getElementById('emptyState').style.display = 'none';

      try {
        const params = new URLSearchParams({ page, limit: 10, search, date });
        const res = await authFetch('/api/tickets?' + params);
        const data = await res.json();
        currentData = data;

        document.getElementById('loadingState').style.display = 'none';

        if (data.tickets.length === 0) {
          document.getElementById('emptyState').style.display = 'block';
        } else {
          document.getElementById('ticketList').style.display = 'flex';
          renderTickets(data.tickets);
        }

        document.getElementById('pageInfo').textContent = 'Page ' + data.page + ' of ' + data.totalPages;
        document.getElementById('prevPage').disabled = data.page <= 1;
        document.getElementById('nextPage').disabled = data.page >= data.totalPages;
      } catch (err) { document.getElementById('loadingState').style.display = 'none'; }
    }

    function renderTickets(tickets) {
      const list = document.getElementById('ticketList');
      list.innerHTML = tickets.map(t => {
        const statusClass = t.status === 'Active' ? 'active' : 'used';
        const statusLabel = t.status === 'Active' ? 'Active' : 'Used';
        return `<div class="ticket-card">
          <div class="tc-top">
            <span class="tc-id">${escHtml(t.ticketId)}</span>
            <span class="tc-status ${statusClass}">${statusLabel}</span>
          </div>
          <div class="tc-name">${escHtml(t.fullName)}</div>
          <div class="tc-meta">
            <span>&#128231; ${escHtml(t.email)}</span>
            <span>&#128197; ${escHtml(t.eventDate)}</span>
          </div>
          <div class="tc-actions">
            <button class="tc-view" onclick="viewTicket('${t.ticketId}')">View Pass</button>
            <button class="tc-qr" onclick="downloadQR('${t.ticketId}')">QR</button>
            <button class="tc-del" onclick="deleteTicket(${t.id})">Delete</button>
          </div>
        </div>`;
      }).join('');
    }

    function escHtml(str) {
      const d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }

    function changePage(delta) {
      const newPage = currentPage + delta;
      if (newPage >= 1) loadTickets(newPage);
    }

    function viewTicket(ticketId) { window.open('/ticket/' + ticketId, '_blank'); }
    function downloadQR(ticketId) { window.open('/api/tickets/download-qr/' + ticketId, '_blank'); }

    async function deleteTicket(id) {
      if (!confirm('Delete this ticket? This cannot be undone.')) return;
      try {
        const res = await authFetch('/api/tickets/' + id, { method: 'DELETE' });
        if (!res.ok) { showToast('Delete failed', 'error'); return; }
        loadStats();
        loadTickets(currentPage);
        showToast('Ticket deleted', 'success');
      } catch (err) { showToast('Error: ' + err.message, 'error'); }
    }

    function showToast(msg, type) {
      const existing = document.querySelector('.toast');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className = 'toast ' + type;
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2500);
    }
  </script>
</body>
</html>
