<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Scan Tickets - Event Ticket System</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #07070f; min-height: 100vh; color: #fff;
    }
    #bg-gradient {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(139,92,246,0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 100%, rgba(236,72,153,0.07) 0%, transparent 60%);
    }

    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; background: transparent !important;
      margin-bottom: 0 !important; box-shadow: none !important;
      border-radius: 0 !important;
    }
    .top-bar .brand { display: flex; align-items: center; gap: 10px; }
    .top-bar .brand-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #8b5cf6, #ec4899);
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
      font-size: 15px; box-shadow: 0 3px 10px rgba(139,92,246,0.35);
    }
    .top-bar .brand-name {
      font-size: 15px; font-weight: 700;
      background: linear-gradient(135deg, #c4b5fd, #f9a8d4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: -0.3px;
    }
    .top-bar .user-section { display: flex; align-items: center; gap: 8px; }
    .top-bar .avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #db2777);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #fff;
      box-shadow: 0 2px 8px rgba(139,92,246,0.3);
    }
    .top-bar .logout-btn {
      width: 30px; height: 30px; border-radius: 50%;
      background: rgba(239,68,68,0.12); border: none;
      color: #f87171; font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .top-bar .logout-btn:active { background: rgba(239,68,68,0.25); transform: scale(0.9); }

    .tabs {
      display: flex; padding: 8px 16px; gap: 6px; margin-bottom: 4px;
    }
    .tab {
      padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: 600;
      font-family: inherit; cursor: pointer; border: none; white-space: nowrap;
      background: rgba(139,92,246,0.06); color: #64748b;
      transition: all 0.2s;
    }
    .tab.active { background: rgba(139,92,246,0.18); color: #c4b5fd; }
    .tab:active { transform: scale(0.96); }

    .content { padding: 12px 16px 80px; max-width: 600px; margin: 0 auto; }

    .scanner-card {
      background: rgba(139,92,246,0.04);
      border: 1px solid rgba(139,92,246,0.1);
      border-radius: 20px; padding: 24px;
    }
    .scanner-card h2 {
      font-size: 18px; font-weight: 600; margin-bottom: 16px;
      background: linear-gradient(135deg, #c4b5fd, #f9a8d4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .scanner-status {
      padding: 12px 16px; border-radius: 12px; font-size: 14px; display: none; margin-bottom: 16px;
    }
    .scanner-status.success { background: rgba(16,185,129,0.15); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.2); display: block; }
    .scanner-status.error { background: rgba(239,68,68,0.15); color: #fca5a5; border: 1px solid rgba(239,68,68,0.2); display: block; }
    .scanner-status.info { background: rgba(59,130,246,0.15); color: #93c5fd; border: 1px solid rgba(59,130,246,0.2); display: block; }
    .scanner-status.warning { background: rgba(245,158,11,0.15); color: #fde68a; border: 1px solid rgba(245,158,11,0.2); display: block; }

    .scan-buttons { display: flex; gap: 10px; margin-bottom: 16px; }
    .scan-buttons button {
      flex: 1; padding: 14px; border-radius: 14px; font-size: 14px; font-weight: 600;
      font-family: inherit; cursor: pointer; border: none; transition: all 0.12s;
    }
    .scan-buttons button:active { transform: scale(0.97); }
    .btn-cam { background: linear-gradient(135deg, #7c3aed, #6d28d9); color: #fff; box-shadow: 0 4px 14px rgba(124,58,237,0.3); }
    .btn-upload { background: rgba(139,92,246,0.08); color: #a78bfa; border: 1px solid rgba(139,92,246,0.15); }

    #reader { border: 2px dashed rgba(139,92,246,0.2); border-radius: 16px; overflow: hidden; margin-bottom: 12px; }
    #reader video { border-radius: 14px; }
    .camera-stop {
      width: 100%; padding: 10px; border-radius: 10px;
      background: rgba(239,68,68,0.12); color: #fca5a5;
      border: none; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer;
    }

    .manual-entry {
      margin-top: 16px; padding: 16px; background: rgba(139,92,246,0.03);
      border-radius: 14px; border: 1px solid rgba(139,92,246,0.08);
    }
    .manual-entry label { display: block; margin-bottom: 8px; color: #94a3b8; font-size: 13px; font-weight: 500; }
    .manual-entry .input-row { display: flex; gap: 8px; }
    .manual-entry input {
      flex: 1; padding: 10px 12px; background: rgba(139,92,246,0.06);
      border: 1px solid rgba(139,92,246,0.12); border-radius: 10px;
      font-size: 14px; font-family: inherit; color: #e2e8f0; outline: none;
    }
    .manual-entry input:focus { border-color: #8b5cf6; box-shadow: 0 0 0 2px rgba(139,92,246,0.1); }
    .manual-entry button {
      padding: 10px 20px; background: linear-gradient(135deg, #7c3aed, #6d28d9); color: #fff; border: none;
      border-radius: 10px; font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer;
    }

    .result-card {
      margin-top: 16px; padding: 20px; border-radius: 16px; text-align: center;
      animation: fadeUp 0.3s ease;
    }
    .result-card.success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2); }
    .result-card.fail { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); }
    .result-card .result-icon { font-size: 48px; margin-bottom: 8px; }
    .result-card h3 { font-size: 18px; margin-bottom: 4px; }
    .result-card.success h3 { color: #6ee7b7; }
    .result-card.fail h3 { color: #fca5a5; }
    .result-card p { font-size: 14px; color: #94a3b8; margin-bottom: 4px; }
    .result-card .detail-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; border-bottom: 1px solid rgba(139,92,246,0.08); }
    .result-card .detail-row:last-child { border: none; }
    .result-card .detail-row .lbl { color: #64748b; }
    .result-card .detail-row .val { color: #e2e8f0; font-weight: 500; }

    .pagination { border-top: none !important; }
    .pagination button:hover:not(:disabled) { background: rgba(139,92,246,0.2) !important; color: #c4b5fd !important; border-color: transparent !important; }

    .loading-spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(139,92,246,0.15); border-top-color: #a78bfa;
      border-radius: 50%; animation: spin 0.6s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .persons-badge {
      margin: 14px auto 16px;
      width: fit-content;
      background: linear-gradient(135deg, rgba(16,185,129,0.15), rgba(16,185,129,0.08));
      border: 2px solid rgba(16,185,129,0.3);
      border-radius: 20px;
      padding: 12px 28px;
      text-align: center;
      animation: badgePulse 2s ease-in-out infinite;
    }
    .persons-badge .pb-count {
      font-size: 56px;
      font-weight: 900;
      color: #6ee7b7;
      line-height: 1;
      letter-spacing: -2px;
      text-shadow: 0 0 30px rgba(16,185,129,0.3);
    }
    .persons-badge .pb-label {
      font-size: 14px;
      font-weight: 700;
      color: #6ee7b7;
      letter-spacing: 2px;
      margin-top: 2px;
    }
    .persons-badge .pb-icons {
      font-size: 22px;
      margin-top: 4px;
      letter-spacing: 4px;
    }
    @keyframes badgePulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0.2); }
      50% { box-shadow: 0 0 20px 4px rgba(16,185,129,0.15); }
    }
  </style>
</head>
<body>
  <div id="bg-gradient"></div>

  <div class="top-bar">
    <div class="brand">
      <div class="brand-icon">&#127928;</div>
      <span class="brand-name">EventTix</span>
    </div>
    <div class="user-section" id="userSection" style="display:none">
      <div class="avatar" id="avatarEl">A</div>
      <button class="logout-btn" id="logoutBtn" onclick="logout()" title="Sign Out">&#10140;</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab" onclick="window.location.href='/dashboard.html'">&#9783; Dashboard</button>
    <button class="tab active">&#128247; Scanner</button>
  </div>

  <div class="content">
    <div class="scanner-card">
      <h2>&#128247; Scan Entry Pass</h2>

      <div id="scannerStatus" class="scanner-status"></div>

      <div class="scan-buttons">
        <button class="btn-cam" onclick="startCameraScan()">&#128247; Camera</button>
        <button class="btn-upload" onclick="document.getElementById('qrFileInput').click()">&#128206; Upload</button>
      </div>
      <input type="file" id="qrFileInput" accept="image/*" style="display:none" onchange="handleFile(event)">

      <div id="cameraSection" style="display:none">
        <div id="reader"></div>
        <button class="camera-stop" onclick="stopCameraScan()">Stop Camera</button>
      </div>

      <div id="scanResult"></div>

      <div class="manual-entry">
        <label>Manual Ticket Lookup</label>
        <div class="input-row">
          <input type="text" id="manualTicketId" placeholder="Enter ticket ID (e.g., TKT-000001)">
          <button onclick="lookupTicket()">Look Up</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    function getToken() {
      const r = localStorage.getItem('authRemember');
      if (r === '1') return localStorage.getItem('authToken');
      return localStorage.getItem('authToken') || sessionStorage.getItem('authToken');
    }

    function clearAuth() {
      localStorage.removeItem('authToken'); localStorage.removeItem('authUser');
      localStorage.removeItem('authRemember'); sessionStorage.removeItem('authToken');
      sessionStorage.removeItem('authUser');
    }

    async function checkAuth() {
      const token = getToken();
      if (!token) { window.location.href = '/login.html?redirect=/scanner.html'; return; }
      try {
        const res = await fetch('/api/auth/check', { headers: { 'Authorization': 'Bearer ' + token } });
        const data = await res.json();
        if (!data.authenticated) { clearAuth(); window.location.href = '/login.html?redirect=/scanner.html'; return; }
        const name = data.username || 'A';
        document.getElementById('avatarEl').textContent = name.charAt(0).toUpperCase();
        document.getElementById('userSection').style.display = 'flex';
      } catch (e) { window.location.href = '/login.html?redirect=/scanner.html'; }
    }

    function logout() {
      const token = getToken();
      if (token) fetch('/api/auth/logout', { method: 'POST', headers: { 'Authorization': 'Bearer ' + token } }).catch(() => {});
      clearAuth();
      window.location.href = '/login.html';
    }

    document.addEventListener('DOMContentLoaded', async function() { await checkAuth(); });

    let html5QrCode = null;
    let cameraActive = false;

    async function startCameraScan() {
      const section = document.getElementById('cameraSection');
      const status = document.getElementById('scannerStatus');
      status.style.display = 'none';
      if (html5QrCode && cameraActive) { stopCameraScan(); return; }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        stream.getTracks().forEach(t => t.stop());
        section.style.display = 'block';
        html5QrCode = new Html5Qrcode("reader");
        await html5QrCode.start(
          { facingMode: "environment" },
          { fps: 10, qrbox: { width: 250, height: 250 } },
          function(decodedText) { processScan(decodedText); },
          function() {}
        );
        cameraActive = true;
        showStatus('Camera active. Scan a ticket QR code.', 'info');
      } catch (err) {
        section.style.display = 'none';
        if (err.name === 'NotAllowedError') {
          showStatus('Camera access denied. Use Upload or Manual Entry.', 'error');
        } else {
          showStatus('Camera not available on this device.', 'error');
        }
      }
    }

    function stopCameraScan() {
      if (html5QrCode && cameraActive) {
        html5QrCode.stop().then(() => { cameraActive = false; }).catch(() => {});
      }
      document.getElementById('cameraSection').style.display = 'none';
    }

    function handleFile(event) {
      const file = event.target.files[0];
      if (!file) return;
      showStatus('Scanning QR image...', 'info');
      scanFile(file);
      event.target.value = '';
    }

    async function scanFile(file) {
      try {
        const codeScanner = new Html5Qrcode("reader");
        const decodedText = await codeScanner.scanFile(file, false);
        codeScanner.clear();
        processScan(decodedText);
      } catch (err) {
        showStatus('Could not read QR code. Try a clearer image.', 'error');
      }
    }

    let lastScannedId = null;
    let lastScannedTime = 0;

    function processScan(decodedText) {
      let ticketId = null, token = null;
      const urlMatch = decodedText.match(/\/api\/tickets\/verify\/(TKT-\d+)\?token=([a-f0-9]+)/);
      if (urlMatch) { ticketId = urlMatch[1]; token = urlMatch[2]; }
      else if (/^TKT-\d{6}$/.test(decodedText.trim())) { ticketId = decodedText.trim(); }
      if (ticketId) {
        const now = Date.now();
        if (ticketId === lastScannedId && now - lastScannedTime < 3000) return;
        lastScannedId = ticketId;
        lastScannedTime = now;
        verifyTicket(ticketId, token);
      }
      else { showStatus('Invalid QR code. Not a valid event ticket.', 'error'); }
    }

    async function verifyTicket(ticketId, token) {
      document.getElementById('scannerStatus').style.display = 'none';
      document.getElementById('scanResult').innerHTML = '<div style="text-align:center;padding:20px"><div class="loading-spinner"></div><p style="color:#94a3b8">Verifying ticket...</p></div>';
      try {
        let url = '/api/tickets/verify/' + encodeURIComponent(ticketId);
        if (token) url += '?token=' + encodeURIComponent(token);
        const res = await fetch(url);
        const data = await res.json();
        if (data.valid) { showSuccessResult(data); }
        else { showFailResult(data); }
      } catch (err) {
        document.getElementById('scanResult').innerHTML = '';
        showStatus('Connection error: ' + err.message, 'error');
      }
    }

    function showSuccessResult(data) {
      const t = data.ticket;
      const count = t.quantity || 1;
      const personsWord = count + (count > 1 ? ' PERSONS' : ' PERSON');
      const personsIcons = count > 1 ? '&#128100;&#128100;' : '&#128100;';
      document.getElementById('scanResult').innerHTML = `
        <div class="result-card success">
          <div class="result-icon">&#10003;</div>
          <h3>Entry Approved</h3>
          <p>Welcome, ${escHtml(t.fullName)}!</p>
          <div class="persons-badge">
            <div class="pb-count">${count}</div>
            <div class="pb-label">${personsWord}</div>
            <div class="pb-icons">${personsIcons}</div>
          </div>
          <div style="margin-top:12px;text-align:left">
            <div class="detail-row"><span class="lbl">Ticket ID</span><span class="val">${escHtml(t.ticketId)}</span></div>
            <div class="detail-row"><span class="lbl">Category</span><span class="val">${escHtml(t.ticketType)}</span></div>
            <div class="detail-row"><span class="lbl">Attendee</span><span class="val">${escHtml(t.fullName)}</span></div>
            <div class="detail-row"><span class="lbl">Amount Paid</span><span class="val">${t.price === 0 ? 'FREE' : '₹' + (t.price / 100)}</span></div>
            <div class="detail-row"><span class="lbl">Event Date</span><span class="val">${escHtml(t.eventDate)}</span></div>
            <div class="detail-row"><span class="lbl">Status</span><span class="val" style="color:#34d399">Used</span></div>
          </div>
        </div>`;
      showStatus('Ticket verified successfully!', 'success');
      clearTimeout(window._resultTimer);
      window._resultTimer = setTimeout(() => {
        document.getElementById('scanResult').innerHTML = '';
        document.getElementById('scannerStatus').style.display = 'none';
      }, 5000);
    }

    function showFailResult(data) {
      document.getElementById('scanResult').innerHTML = `
        <div class="result-card fail">
          <div class="result-icon">&#10007;</div>
          <h3>Entry Denied</h3>
          <p>${escHtml(data.reason || 'Invalid ticket')}</p>
          ${data.usedAt ? '<p style="font-size:12px;margin-top:4px">Previously used at: ' + escHtml(data.usedAt) + '</p>' : ''}
        </div>`;
      showStatus('Ticket rejected: ' + (data.reason || 'Invalid'), 'error');
      clearTimeout(window._resultTimer);
      window._resultTimer = setTimeout(() => {
        document.getElementById('scanResult').innerHTML = '';
        document.getElementById('scannerStatus').style.display = 'none';
      }, 5000);
    }

    function lookupTicket() {
      const id = document.getElementById('manualTicketId').value.trim().toUpperCase();
      if (!id) { showStatus('Enter a ticket ID', 'error'); return; }
      if (!/^TKT-\d{6}$/.test(id)) { showStatus('Invalid format. Use TKT-000001', 'error'); return; }
      verifyTicket(id, null);
    }

    function showStatus(msg, type) {
      const el = document.getElementById('scannerStatus');
      el.textContent = msg;
      el.className = 'scanner-status ' + type;
    }

    function escHtml(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    document.getElementById('manualTicketId').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') lookupTicket();
    });
  </script>
</body>
</html>
