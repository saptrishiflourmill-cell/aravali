<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scan Tickets - Event Ticket System</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f0f1a;
      min-height: 100vh;
    }
    .layout { display: flex; min-height: 100vh; }
    .sidebar {
      width: 240px; background: rgba(255,255,255,0.03);
      border-right: 1px solid rgba(255,255,255,0.06);
      padding: 24px 16px; flex-shrink: 0;
    }
    .sidebar .sidebar-header { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
    .sidebar .sidebar-header .logo {
      width: 40px; height: 40px; background: linear-gradient(135deg, #8b5cf6, #ec4899);
      border-radius: 12px; display: flex; align-items: center; justify-content: center;
      font-size: 20px; color: #fff;
    }
    .sidebar .sidebar-header h2 { color: #fff; font-size: 16px; font-weight: 700; }
    .sidebar .sidebar-header p { color: #64748b; font-size: 11px; }
    .sidebar-nav { display: flex; flex-direction: column; gap: 4px; }
    .sidebar-nav a {
      padding: 10px 14px; border-radius: 10px; color: #94a3b8; text-decoration: none;
      font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 10px;
      transition: all 0.15s;
    }
    .sidebar-nav a:hover { background: rgba(255,255,255,0.05); color: #e2e8f0; }
    .sidebar-nav a.active { background: rgba(139,92,246,0.15); color: #a78bfa; }

    .main-content { flex: 1; padding: 24px; overflow: auto; }
    .top-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px;
    }
    .top-bar h1 { color: #fff; font-size: 24px; font-weight: 700; }
    .top-bar .user-area { display: flex; align-items: center; gap: 12px; }
    .top-bar .user-area span { color: #94a3b8; font-size: 13px; }

    .content-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 24px;
      max-width: 600px;
      margin: 0 auto;
    }
    .content-card .card-header { margin-bottom: 20px; }
    .content-card .card-header h2 { color: #fff; font-size: 18px; font-weight: 600; }

    .scanner-container { text-align: center; }
    .scanner-result {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }
    .scanner-result.success { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.2); display: block; }
    .scanner-result.error { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.2); display: block; }
    .scanner-result.info { background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.2); display: block; }
    .scanner-result.warning { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.2); display: block; }

    .scan-buttons { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 12px; }
    .scan-buttons button {
      padding: 12px 24px; border-radius: 14px; font-size: 15px; font-weight: 600;
      font-family: inherit; cursor: pointer; border: none; transition: all 0.2s;
    }
    .scan-buttons .btn-cam { background: linear-gradient(135deg, #8b5cf6, #7c3aed); color: #fff; }
    .scan-buttons .btn-cam:hover { box-shadow: 0 4px 20px rgba(139,92,246,0.3); }
    .scan-buttons .btn-upload { background: rgba(255,255,255,0.06); color: #94a3b8; border: 1px solid rgba(255,255,255,0.1); }
    .scan-buttons .btn-upload:hover { background: rgba(255,255,255,0.1); }

    #cameraFeed { display: none; max-width: 400px; margin: 16px auto; }
    #cameraFeed #reader { border: 2px dashed rgba(255,255,255,0.15); border-radius: 16px; overflow: hidden; }

    .manual-entry {
      margin-top: 16px; padding: 16px; background: rgba(255,255,255,0.03);
      border-radius: 12px; border: 1px solid rgba(255,255,255,0.06);
    }
    .manual-entry label { font-weight: 500; display: block; margin-bottom: 8px; color: #94a3b8; font-size: 13px; }
    .manual-entry .input-row { display: flex; gap: 8px; }
    .manual-entry input {
      flex: 1; padding: 10px 12px; background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
      font-size: 14px; font-family: inherit; color: #fff; outline: none;
    }
    .manual-entry input:focus { border-color: #8b5cf6; }
    .manual-entry button {
      padding: 10px 20px; background: #8b5cf6; color: #fff; border: none;
      border-radius: 10px; font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer;
    }

    .result-card {
      margin-top: 16px; padding: 20px;
      border-radius: 16px;
      text-align: center;
      animation: fadeUp 0.3s ease;
    }
    .result-card.success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2); }
    .result-card.fail { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); }
    .result-card .result-icon { font-size: 48px; margin-bottom: 8px; }
    .result-card h3 { font-size: 18px; margin-bottom: 4px; }
    .result-card.success h3 { color: #34d399; }
    .result-card.fail h3 { color: #f87171; }
    .result-card p { font-size: 14px; color: #94a3b8; margin-bottom: 4px; }
    .result-card .detail-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .result-card .detail-row:last-child { border: none; }
    .result-card .detail-row .lbl { color: #64748b; }
    .result-card .detail-row .val { color: #e2e8f0; font-weight: 500; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .hamburger { display: none; background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; }

    @media (max-width: 768px) {
      .sidebar { display: none; position: fixed; top: 0; left: 0; height: 100%; z-index: 100; background: #0f0f1a; }
      .sidebar.open { display: block; }
      .hamburger { display: block; }
      .main-content { padding: 16px; }
      .content-card { padding: 16px; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">&#127928;</div>
        <div>
          <h2>EventTix</h2>
          <p>Event Ticket System</p>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a href="/dashboard.html"><span class="icon">&#9776;</span> Dashboard</a>
        <a href="/scanner.html" class="active"><span class="icon">&#128247;</span> Scan Tickets</a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="top-bar">
        <div style="display:flex;align-items:center;gap:12px">
          <button class="hamburger" onclick="toggleSidebar()">&#9776;</button>
          <h1>Scan Tickets</h1>
        </div>
        <div class="user-area">
          <span id="userDisplay" style="display:none"></span>
          <button class="btn-outline" onclick="logout()" id="logoutBtn" style="display:none;padding:8px 16px;border-radius:10px;background:rgba(255,255,255,0.06);color:#94a3b8;border:1px solid rgba(255,255,255,0.1);font-family:inherit;font-size:13px;cursor:pointer">Logout</button>
        </div>
      </div>

      <div class="content-card">
        <div class="card-header">
          <h2>&#128247; Scan Entry Pass</h2>
        </div>
        <div class="scanner-container">
          <div id="scannerStatus" class="scanner-result"></div>

          <div style="padding:12px 0">
            <div class="scan-buttons">
              <button class="btn-cam" onclick="startCameraScan()">&#128247; Scan with Camera</button>
              <button class="btn-upload" onclick="document.getElementById('qrFileInput').click()">&#128206; Upload QR</button>
            </div>
            <input type="file" id="qrFileInput" accept="image/*" style="display:none" onchange="handleFile(event)">
            <div id="cameraFeed">
              <div id="reader"></div>
              <button style="margin-top:8px;padding:10px 20px;background:rgba(239,68,68,0.2);color:#f87171;border:none;border-radius:10px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer" onclick="stopCameraScan()">Stop Camera</button>
            </div>
          </div>

          <div id="scanResult"></div>

          <div class="manual-entry">
            <label>Manual Ticket Lookup</label>
            <div class="input-row">
              <input type="text" id="manualTicketId" placeholder="Enter ticket ID (e.g., TKT-000001)">
              <button onclick="lookupTicket()">Look Up</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

    function getToken() {
      const r = localStorage.getItem('authRemember');
      if (r === '1') return localStorage.getItem('authToken');
      return localStorage.getItem('authToken') || sessionStorage.getItem('authToken');
    }

    function clearAuth() {
      localStorage.removeItem('authToken');
      localStorage.removeItem('authUser');
      localStorage.removeItem('authRemember');
      sessionStorage.removeItem('authToken');
      sessionStorage.removeItem('authUser');
    }

    async function checkAuth() {
      const token = getToken();
      if (!token) { window.location.href = '/login.html?redirect=/scanner.html'; return; }
      try {
        const res = await fetch('/api/auth/check', { headers: { 'Authorization': 'Bearer ' + token } });
        const data = await res.json();
        if (!data.authenticated) {
          clearAuth();
          window.location.href = '/login.html?redirect=/scanner.html'; return;
        }
        document.getElementById('userDisplay').textContent = data.username;
        document.getElementById('userDisplay').style.display = 'inline';
        document.getElementById('logoutBtn').style.display = 'inline-block';
      } catch (e) {
        window.location.href = '/login.html?redirect=/scanner.html';
      }
    }

    function logout() {
      const token = getToken();
      if (token) fetch('/api/auth/logout', { method: 'POST', headers: { 'Authorization': 'Bearer ' + token } }).catch(() => {});
      clearAuth();
      window.location.href = '/login.html';
    }

    document.addEventListener('DOMContentLoaded', async function() { await checkAuth(); });

    let html5QrCode = null;
    let cameraActive = false;

    async function startCameraScan() {
      const cameraFeed = document.getElementById('cameraFeed');
      const status = document.getElementById('scannerStatus');
      status.style.display = 'none';

      if (html5QrCode && cameraActive) { stopCameraScan(); return; }

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        stream.getTracks().forEach(t => t.stop());

        cameraFeed.style.display = 'block';
        html5QrCode = new Html5Qrcode("reader");
        await html5QrCode.start(
          { facingMode: "environment" },
          { fps: 10, qrbox: { width: 250, height: 250 } },
          function(decodedText) {
            stopCameraScan();
            processScan(decodedText);
          },
          function() {}
        );
        cameraActive = true;
        showStatus('Camera active. Scan a ticket QR code.', 'info');
      } catch (err) {
        cameraFeed.style.display = 'none';
        if (err.name === 'NotAllowedError') {
          showStatus('Camera access denied. Use Upload QR or Manual Entry.', 'error');
        } else {
          showStatus('Camera not available. Use Upload Image instead.', 'error');
        }
      }
    }

    function stopCameraScan() {
      if (html5QrCode && cameraActive) {
        html5QrCode.stop().then(() => { cameraActive = false; }).catch(() => {});
      }
      document.getElementById('cameraFeed').style.display = 'none';
    }

    function handleFile(event) {
      const file = event.target.files[0];
      if (!file) return;
      showStatus('Scanning QR image...', 'info');
      scanFile(file);
      event.target.value = '';
    }

    async function scanFile(file) {
      try {
        const codeScanner = new Html5Qrcode("reader");
        const decodedText = await codeScanner.scanFile(file, false);
        codeScanner.clear();
        processScan(decodedText);
      } catch (err) {
        showStatus('Could not read QR code. Try a clearer image.', 'error');
      }
    }

    function processScan(decodedText) {
      let ticketId = null;
      let token = null;

      const urlMatch = decodedText.match(/\/api\/tickets\/verify\/(TKT-\d+)\?token=([a-f0-9]+)/);
      if (urlMatch) {
        ticketId = urlMatch[1];
        token = urlMatch[2];
      } else if (/^TKT-\d{6}$/.test(decodedText.trim())) {
        ticketId = decodedText.trim();
      }

      if (ticketId) {
        verifyTicket(ticketId, token);
      } else {
        showStatus('Invalid QR code. Not a valid event ticket.', 'error');
      }
    }

    async function verifyTicket(ticketId, token) {
      document.getElementById('scannerStatus').style.display = 'none';
      document.getElementById('scanResult').innerHTML = '<div style="text-align:center;padding:20px"><div class="spinner" style="width:32px;height:32px;border:3px solid rgba(139,92,246,0.2);border-top-color:#8b5cf6;border-radius:50%;animation:spin 0.6s linear infinite;margin:0 auto 12px"></div><p style="color:#94a3b8">Verifying ticket...</p></div>';

      try {
        let url = '/api/tickets/verify/' + encodeURIComponent(ticketId);
        if (token) url += '?token=' + encodeURIComponent(token);
        const res = await fetch(url);
        const data = await res.json();

        if (data.valid) {
          showSuccessResult(data);
        } else {
          showFailResult(data);
        }
      } catch (err) {
        document.getElementById('scanResult').innerHTML = '';
        showStatus('Connection error: ' + err.message, 'error');
      }
    }

    function showSuccessResult(data) {
      const t = data.ticket;
      document.getElementById('scanResult').innerHTML = `
        <div class="result-card success">
          <div class="result-icon">&#10003;</div>
          <h3>Entry Approved</h3>
          <p>Welcome, ${escHtml(t.fullName)}!</p>
          <div style="margin-top:12px;text-align:left">
            <div class="detail-row"><span class="lbl">Ticket ID</span><span class="val">${escHtml(t.ticketId)}</span></div>
            <div class="detail-row"><span class="lbl">Type</span><span class="val">${escHtml(t.ticketType)}</span></div>
            <div class="detail-row"><span class="lbl">Event Date</span><span class="val">${escHtml(t.eventDate)}</span></div>
            <div class="detail-row"><span class="lbl">Status</span><span class="val" style="color:#10b981">Used</span></div>
          </div>
        </div>
      `;
      showStatus('Ticket verified successfully!', 'success');
    }

    function showFailResult(data) {
      document.getElementById('scanResult').innerHTML = `
        <div class="result-card fail">
          <div class="result-icon">&#10007;</div>
          <h3>Entry Denied</h3>
          <p>${escHtml(data.reason || 'Invalid ticket')}</p>
          ${data.usedAt ? `<p style="font-size:12px;margin-top:4px">Previously used at: ${escHtml(data.usedAt)}</p>` : ''}
        </div>
      `;
      showStatus('Ticket rejected: ' + (data.reason || 'Invalid'), 'error');
    }

    function lookupTicket() {
      const id = document.getElementById('manualTicketId').value.trim().toUpperCase();
      if (!id) { showStatus('Enter a ticket ID', 'error'); return; }
      if (!/^TKT-\d{6}$/.test(id)) { showStatus('Invalid format. Use TKT-000001', 'error'); return; }
      verifyTicket(id, null);
    }

    function showStatus(msg, type) {
      const el = document.getElementById('scannerStatus');
      el.textContent = msg;
      el.className = 'scanner-result ' + type;
    }

    function escHtml(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    document.getElementById('manualTicketId').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') lookupTicket();
    });
  </script>
</body>
</html>
