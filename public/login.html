<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Visitor Management System</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .login-page { display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);padding:20px }
    .login-card { max-width:400px;width:100%;background:var(--card-bg);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);padding:40px }
    .login-logo { text-align:center;margin-bottom:32px }
    .login-logo h1 { font-size:24px;margin-bottom:4px }
    .login-logo p { color:var(--text-light);font-size:14px }
    .login-error { background:#fee2e2;color:#991b1b;padding:10px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:16px;display:none }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div style="font-size:48px;margin-bottom:8px">&#128274;</div>
        <h1>VisitManager</h1>
        <p>Admin Login</p>
      </div>

      <div id="loginError" class="login-error"></div>

      <form id="loginForm">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" placeholder="Enter admin username" required autocomplete="username">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Enter password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary w-full" id="loginBtn" style="padding:12px;font-size:16px;margin-top:8px">Sign In</button>
      </form>

      <div style="text-align:center;margin-top:20px;padding-top:20px;border-top:1px solid var(--border)">
        <a href="/" style="font-size:14px">&#8592; Back to Registration</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (!res.ok) {
          showError(data.error || 'Login failed');
          btn.disabled = false;
          btn.textContent = 'Sign In';
          return;
        }

        localStorage.setItem('authToken', data.token);
        localStorage.setItem('authUser', data.username);
        const redirect = new URLSearchParams(window.location.search).get('redirect') || '/dashboard.html';
        window.location.href = redirect;
      } catch (err) {
        showError('Connection error: ' + err.message);
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });

    function showError(msg) {
      const el = document.getElementById('loginError');
      el.textContent = msg;
      el.style.display = 'block';
    }

    document.getElementById('username').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') document.getElementById('password').focus();
    });
  </script>
</body>
</html>
