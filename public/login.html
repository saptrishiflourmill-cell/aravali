<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Event Ticket System</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f0f1a;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
    }
    .login-card {
      max-width: 400px; width: 100%;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo .logo-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #8b5cf6, #ec4899);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; margin: 0 auto 12px;
      box-shadow: 0 8px 24px rgba(139,92,246,0.3);
    }
    .login-logo h1 { color: #fff; font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .login-logo p { color: #64748b; font-size: 14px; }
    .login-error {
      background: rgba(239,68,68,0.15); color: #f87171;
      padding: 10px 14px; border-radius: 10px; font-size: 13px;
      margin-bottom: 16px; display: none; border: 1px solid rgba(239,68,68,0.2);
    }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .form-group input {
      width: 100%; padding: 14px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      font-size: 15px; font-family: inherit; color: #fff; outline: none;
      transition: all 0.25s;
    }
    .form-group input:focus { border-color: #8b5cf6; box-shadow: 0 0 0 3px rgba(139,92,246,0.15); }
    .form-group input::placeholder { color: #475569; }
    .checkbox-label { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #94a3b8; cursor: pointer; margin: 8px 0 4px; }
    .btn-primary {
      width: 100%; padding: 14px;
      border: none; border-radius: 14px;
      font-size: 16px; font-weight: 600; font-family: inherit;
      background: linear-gradient(135deg, #8b5cf6, #ec4899);
      color: #fff; cursor: pointer; transition: all 0.3s;
      margin-top: 8px;
    }
    .btn-primary:hover { box-shadow: 0 8px 24px rgba(139,92,246,0.3); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .back-link { text-align: center; margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.06); }
    .back-link a { color: #64748b; font-size: 14px; text-decoration: none; }
    .back-link a:hover { color: #94a3b8; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">&#128274;</div>
      <h1>EventTix</h1>
      <p>Admin Login</p>
    </div>

    <div id="loginError" class="login-error"></div>

    <form id="loginForm">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter admin username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password" required autocomplete="current-password">
      </div>
      <label class="checkbox-label">
        <input type="checkbox" id="rememberMe" checked>
        Remember Me
      </label>
      <button type="submit" class="btn-primary" id="loginBtn">Sign In</button>
    </form>

    <div class="back-link">
      <a href="/">&#8592; Buy Tickets</a>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();

        if (!res.ok) {
          showError(data.error || 'Login failed');
          btn.disabled = false;
          btn.textContent = 'Sign In';
          return;
        }

        const storage = document.getElementById('rememberMe').checked ? localStorage : sessionStorage;
        storage.setItem('authToken', data.token);
        storage.setItem('authUser', data.username);
        localStorage.setItem('authRemember', document.getElementById('rememberMe').checked ? '1' : '0');
        const redirect = new URLSearchParams(window.location.search).get('redirect') || '/dashboard.html';
        window.location.href = redirect;
      } catch (err) {
        showError('Connection error: ' + err.message);
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });

    function showError(msg) {
      const el = document.getElementById('loginError');
      el.textContent = msg;
      el.style.display = 'block';
    }
  </script>
</body>
</html>
